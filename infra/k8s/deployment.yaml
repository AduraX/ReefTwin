apiVersion: apps/v1
kind: Deployment
metadata:
  name: reeftwin-api
  labels:
    app: reeftwin-api
    project: reeftwin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reeftwin-api
  template:
    metadata:
      labels:
        app: reeftwin-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: reeftwin-api:0.1.0
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: REEFTWIN_STATE_PATH
              value: /app/data/gold/reef_state.json
            - name: REEFTWIN_LOG_LEVEL
              value: INFO
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: reeftwin-api-netpol
spec:
  podSelector:
    matchLabels:
      app: reeftwin-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    - {}  # allow all egress (API needs to call NOAA, LLM providers, S3)
---
apiVersion: v1
kind: Service
metadata:
  name: reeftwin-api
spec:
  selector:
    app: reeftwin-api
  ports:
    - port: 8000
      targetPort: 8000
